name: VNC Debug Workflow

on:
  workflow_dispatch: # Allows you to trigger this manually from GitHub UI

jobs:
  debug-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup VNC and noVNC
        run: |
          # 1. Install VNC server and window manager
          sudo apt-get update
          sudo apt-get install -y x11vnc xfce4 xfce4-goodies

          # 2. Start a virtual display (Display :1)
          sudo Xvnc :1 -screen 0 1280x1024x24 &
          sleep 2 # Give it a second to start
          echo "✅ Xvnc (Virtual Display) started on :1"

          # 3. Start the window manager on the new display
          export DISPLAY=:1
          startxfce4 &
          sleep 2
          echo "✅ XFCE Desktop Environment started"

          # 4. Start the VNC server attached to the display
          x11vnc -display :1 -nopw -listen localhost -xkb -ncache 10 -ncache_cr -forever &
          sleep 2
          echo "✅ x11vnc started (Listening on port 5900)"

          # 5. Install and start noVNC (Web-based VNC client)
          sudo apt-get install -y python3-pip git
          git clone https://github.com/novnc/noVNC.git /tmp/noVNC
          git clone https://github.com/novnc/websockify.git /tmp/noVNC/utils/websockify
          /tmp/noVNC/utils/novnc_proxy --vnc localhost:5900 --listen 6080 &
          sleep 2
          echo "✅ noVNC started (Listening on port 6080)"

      - name: Expose VNC to the internet securely
        uses: authzed/actions-n grok@v1
        with:
          ngrok_authtoken: ${{ secrets.3FokGpAwKTR6ArSh7KT7zlGYb5s_7Nk3R7JT8eU2pPi5LQxL9 }}
          port: 6080 # Expose the noVNC web port
          timeout: "6h" # How long the ngrok tunnel stays alive

      - name: Echo Debug Status & Instructions
        run: |
          echo "============================================="
          echo "🖥️  VNC DEBUG SERVER IS NOW RUNNING!  🖥️"
          echo "============================================="
          echo "1. Look at the step above this one."
          echo "2. Find the output that says: 'ngrok tunnel started at...'"
          echo "3. Click that HTTPS URL to open the VNC viewer in your browser."
          echo "4. Click 'Connect' on the noVNC page."
          echo "============================================="
          echo "⏳ The workflow will now sleep for 15 minutes to let you debug."
          echo "============================================="

      - name: Do your actual work here (Example)
        run: |
          export DISPLAY=:1
          # Example: Open a browser or run your failing tests here
          # firefox &
          echo "Running tests..."
          sleep 5 
          echo "Tests done (or failed)."

      - name: Wait for manual debug (Sleep)
        run: |
          # Sleep for 15 minutes (900 seconds) so you have time to look around
          sleep 900

      - name: Stop VNC Server and Echo Status
        if: always() # This ensures VNC stops even if your tests fail
        run: |
          echo "🛑 Stopping VNC services..."
          sudo pkill -f x11vnc
          sudo pkill -f Xvnc
          sudo pkill -f novnc_proxy
          sudo pkill -f startxfce4
          
          # Verify they are stopped
          if pgrep -x "x11vnc" > /dev/null; then
            echo "❌ Error: x11vnc is still running!"
          else
            echo "✅ x11vnc successfully stopped."
          fi

          if pgrep -x "Xvnc" > /dev/null; then
            echo "❌ Error: Xvnc is still running!"
          else
            echo "✅ Xvnc successfully stopped."
          fi
          
          echo "🏁 Debug session finished."
