- name: Setup Headless Display and VNC
  run: |
    sudo apt-get update
    sudo apt-get install -y xfce4 xfce4-goodies tightvncserver fluxbox
    # Start the display
    mkdir -p ~/.vnc
    echo "password123" | vncpasswd -f > ~/.vnc/passwd
    chmod 600 ~/.vnc/passwd
    vncserver :1 -geometry 1280x800 -depth 24

