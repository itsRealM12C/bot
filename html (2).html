<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* This sets the entire background to black */
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        .btn {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 15px 40px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

    <h1>M14C BOT</h1>

    <script>
        function addBot() {
            // Using a clean string to avoid HTML entity errors
            const url = "https://discord.com/oauth2/authorize?client_id=1155053470076915712&permissions=8&scope=bot+applications.commands";
            window.location.href = url;
        }
    </script>
    
    <button class="btn" onclick="addBot()">Add to Server</button>

</body>
</html>
